<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>scrcpy AI Control</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-0: #080b14;
  --bg-1: #0f1526;
  --bg-2: #151e33;
  --card: rgba(17, 25, 44, 0.82);
  --line: rgba(120, 148, 215, 0.25);
  --text: #ecf0ff;
  --text-dim: #9aa8cc;
  --accent: #7b8cff;
  --accent-2: #36d5ff;
  --good: #2fd49c;
  --warn: #ffc857;
  --bad: #ff5f7d;
}
body {
  font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: var(--text);
  background:
    radial-gradient(1000px 600px at -10% -20%, rgba(54, 213, 255, 0.18), transparent 55%),
    radial-gradient(900px 500px at 110% 120%, rgba(123, 140, 255, 0.14), transparent 55%),
    linear-gradient(135deg, var(--bg-0), var(--bg-1) 45%, var(--bg-2));
  height: 100vh;
  display: flex;
  gap: 10px;
  padding: 10px;
  margin: 0;
}

/* Left panel: Remote */
#panel-remote {
  flex: 7;
  display: flex;
  flex-direction: column;
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  background: var(--card);
  backdrop-filter: blur(12px);
  box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
}
#video-wrapper {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at 50% 10%, #0f1628 10%, #02040a 80%);
  min-height: 0;
  position: relative;
  overflow: hidden;
  border: 3px solid transparent;
  transition: border-color 0.2s;
}
#video-wrapper.recording {
  border-color: #e94560;
  box-shadow: inset 0 0 20px rgba(233, 69, 96, 0.15);
}
#remote-video { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
#remote-video.rotated { position: absolute; top: 50%; left: 50%; max-width: none; max-height: none; object-fit: contain; }
#touch-overlay { position: absolute; inset: 0; cursor: crosshair; touch-action: none; }
#video-loading {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0, 0, 0, 0.6);
  color: var(--text-dim);
  font-size: 14px;
  z-index: 10;
  pointer-events: none;
}
#video-loading .spinner {
  width: 44px;
  height: 44px;
  border: 3px solid rgba(123, 140, 255, 0.2);
  border-top: 3px solid var(--accent-2);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.btn-bar {
  display: flex;
  gap: 6px;
  padding: 10px;
  background: linear-gradient(180deg, rgba(20, 29, 51, 0.95), rgba(14, 21, 38, 0.95));
  border-top: 1px solid var(--line);
  flex-wrap: wrap;
  justify-content: center;
}
.btn-bar button {
  padding: 7px 12px;
  font-size: 12px;
  background: linear-gradient(180deg, rgba(123, 140, 255, 0.22), rgba(90, 105, 214, 0.18));
  color: var(--text);
  border: 1px solid rgba(123, 140, 255, 0.35);
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
}
.btn-bar button:hover {
  border-color: rgba(123, 140, 255, 0.65);
  box-shadow: 0 0 0 2px rgba(123, 140, 255, 0.18);
  transform: translateY(-1px);
}
.btn-bar button:active { transform: translateY(0); }

#remote-status {
  padding: 7px 10px;
  font-size: 11px;
  color: var(--text-dim);
  background: rgba(8, 12, 24, 0.88);
  text-align: center;
  border-top: 1px solid var(--line);
  letter-spacing: 0.02em;
}

/* Right panel: AI */
#panel-ai {
  flex: 3;
  display: flex;
  flex-direction: column;
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  background: var(--card);
  backdrop-filter: blur(12px);
  box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
}
#panel-ai header {
  background: linear-gradient(135deg, rgba(22, 30, 54, 0.95), rgba(18, 27, 49, 0.95));
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#panel-ai header h1 {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.01em;
}
#panel-ai header .header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}
#open-settings-btn {
  width: 34px;
  height: 34px;
  padding: 0;
  border-radius: 10px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(123, 140, 255, 0.14);
  border: 1px solid rgba(123, 140, 255, 0.35);
}
#open-settings-btn:hover {
  box-shadow: 0 0 0 2px rgba(123, 140, 255, 0.2);
}
#open-settings-btn.disconnected {
  background: rgba(255, 95, 125, 0.14);
  border-color: rgba(255, 95, 125, 0.45);
}
.settings-icon {
  width: 16px;
  height: 16px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  color: var(--text);
}
.ai-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Tabs */
.tab-bar {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 6px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--line);
  background: rgba(11, 16, 31, 0.7);
}
.tab-btn {
  padding: 9px;
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid transparent;
  background: rgba(255, 255, 255, 0.02);
  color: var(--text-dim);
  border-radius: 10px;
  transition: all 0.18s ease;
}
.tab-btn:hover {
  color: var(--text);
  border-color: rgba(123, 140, 255, 0.3);
  background: rgba(123, 140, 255, 0.08);
}
.tab-btn.active {
  color: #f4f7ff;
  border-color: rgba(123, 140, 255, 0.7);
  background: linear-gradient(145deg, rgba(123, 140, 255, 0.35), rgba(54, 213, 255, 0.18));
}
.tab-content { flex: 1; display: none; flex-direction: column; overflow: hidden; padding: 10px; gap: 10px; }
.tab-content.active { display: flex; }

/* Common */
button {
  background: linear-gradient(150deg, #7b8cff, #5e72ff);
  color: #fff;
  border: 1px solid rgba(132, 147, 255, 0.65);
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
}
button:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(69, 92, 255, 0.35);
}
button:disabled {
  background: rgba(120, 130, 160, 0.25);
  border-color: rgba(120, 130, 160, 0.25);
  color: #9ba5bf;
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}
button.secondary {
  background: rgba(115, 136, 198, 0.18);
  border-color: rgba(115, 136, 198, 0.45);
}
button.secondary:hover { box-shadow: 0 8px 18px rgba(90, 110, 180, 0.25); }
button.danger {
  background: linear-gradient(150deg, #ff6f8e, #ff4f74);
  border-color: rgba(255, 128, 154, 0.65);
}
button.success {
  background: linear-gradient(150deg, #35d39f, #20b784);
  border-color: rgba(89, 231, 178, 0.6);
}
select {
  background: rgba(10, 17, 33, 0.95);
  border: 1px solid rgba(123, 140, 255, 0.3);
  color: var(--text);
  padding: 7px 9px;
  border-radius: 9px;
  font-size: 12px;
  outline: none;
}

/* Rules textarea */
#rules-textarea {
  width: 100%;
  flex: 1;
  min-height: 100px;
  background: rgba(8, 14, 28, 0.95);
  border: 1px solid rgba(123, 140, 255, 0.25);
  color: var(--text);
  padding: 11px;
  border-radius: 10px;
  font-size: 12px;
  font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
  outline: none;
  resize: vertical;
  line-height: 1.65;
}
#rules-textarea:focus {
  border-color: rgba(54, 213, 255, 0.8);
  box-shadow: 0 0 0 3px rgba(54, 213, 255, 0.16);
}
.learn-buttons { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
#summarize-status { font-size: 11px; color: var(--text-dim); margin-left: 2px; }

/* Auto card */
.auto-card {
  background: rgba(8, 13, 26, 0.55);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
  flex-shrink: 0;
}
.auto-card h3 { margin-bottom: 10px; font-size: 14px; }
.auto-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
}
.auto-info {
  display: flex;
  gap: 14px;
  margin-top: 12px;
  justify-content: center;
  font-size: 12px;
  flex-wrap: wrap;
}
.auto-info .label { color: var(--text-dim); }
.auto-info .value { color: var(--good); font-weight: 700; }
.auto-info .value.stopped { color: var(--bad); }

/* Auto log */
.auto-log-card {
  flex: 1;
  min-height: 0;
  background: rgba(8, 13, 26, 0.55);
  border: 1px solid var(--line);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
}
.auto-log-header {
  padding: 8px 12px;
  border-bottom: 1px solid var(--line);
  font-weight: 700;
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.auto-log-header button { padding: 4px 9px; font-size: 10px; }
#auto-log-list, #rec-log-list { flex: 1; overflow-y: auto; padding: 8px 11px; }
.log-entry {
  padding: 6px 0;
  border-bottom: 1px dashed rgba(120, 148, 215, 0.2);
  font-size: 11px;
  line-height: 1.55;
  font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
}
.log-entry:last-child { border-bottom: none; }
.log-ts { color: #7485b0; }
.log-ai { color: var(--good); }
.log-ai-text { color: #d4dcf2; }
.log-tool { color: var(--warn); }
.log-tool-detail { color: #b8c4e6; }

/* Settings */
.setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.setting-row label { min-width: 70px; font-size: 12px; color: var(--text-dim); }
.setting-row input {
  flex: 1;
  background: rgba(8, 14, 28, 0.95);
  border: 1px solid rgba(123, 140, 255, 0.26);
  color: var(--text);
  padding: 7px 9px;
  border-radius: 9px;
  font-size: 12px;
  outline: none;
}
.setting-row input:focus {
  border-color: rgba(54, 213, 255, 0.8);
  box-shadow: 0 0 0 3px rgba(54, 213, 255, 0.14);
}

.settings-modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(2, 6, 16, 0.72);
  backdrop-filter: blur(4px);
  z-index: 50;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 18px;
}
.settings-modal-backdrop.show { display: flex; }
.settings-modal {
  width: min(520px, 96vw);
  background: rgba(15, 22, 40, 0.95);
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
  overflow: hidden;
}
.settings-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
}
.settings-modal-title {
  font-size: 14px;
  font-weight: 700;
}
.settings-modal-body { padding: 12px 14px 8px; }
.settings-modal-actions {
  padding: 0 14px 14px;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, rgba(123, 140, 255, 0.65), rgba(54, 213, 255, 0.55));
  border-radius: 999px;
}

@media (max-width: 1200px) {
  body { gap: 8px; padding: 8px; }
}
@media (max-width: 960px) {
  body { flex-direction: column; height: auto; min-height: 100vh; }
  #panel-remote, #panel-ai { min-height: 360px; }
}
</style>
</head>
<body>

<!-- Left Panel: Remote -->
<div id="panel-remote">
  <div id="video-wrapper">
    <video id="remote-video" autoplay muted playsinline></video>
    <canvas id="touch-overlay"></canvas>
    <div id="video-loading">
      <div class="spinner"></div>
      <div>Loading video stream...</div>
    </div>
  </div>
  <div class="btn-bar">
    <button onclick="sendKey('back')">Back</button>
    <button onclick="sendKey('home')">Home</button>
    <button onclick="sendKey('app_switch')">Recents</button>
    <button onclick="toggleVideoRotation(event)" title="Click: rotate 90deg, Shift+Click: auto">Rotate</button>
    <button onclick="sendKey('volume_up')">Vol+</button>
    <button onclick="sendKey('volume_down')">Vol-</button>
    <button onclick="sendKey('power')">Power</button>
  </div>
  <div id="remote-status">Not connected</div>
</div>

<!-- Right Panel: AI -->
<div id="panel-ai">
  <header>
    <h1>SCRCPY AI CONTROLLER</h1>
    <div class="header-actions">
      <button id="open-settings-btn" title="Settings" aria-label="Open settings" onclick="openSettingsModal()">
        <svg class="settings-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z"></path>
          <path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a2 2 0 1 1-4 0v-.2a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a2 2 0 1 1 0-4h.2a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1 1 0 0 0 1.1.2 1 1 0 0 0 .6-.9V4a2 2 0 1 1 4 0v.2a1 1 0 0 0 .6.9 1 1 0 0 0 1.1-.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1 1 0 0 0-.2 1.1 1 1 0 0 0 .9.6h.2a2 2 0 1 1 0 4h-.2a1 1 0 0 0-.9.6z"></path>
        </svg>
      </button>
    </div>
  </header>
  <div class="ai-container">
    <!-- Tab Bar -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('record')">Record</button>
      <button class="tab-btn" onclick="switchTab('train')">Train & Play</button>
    </div>

    <!-- Record Tab -->
    <div class="tab-content active" id="tab-record">
      <div class="auto-card">
        <h3>Game Recording</h3>
        <div class="auto-controls">
          <button id="rec-start-btn" class="success" onclick="startRecording()">Start Recording</button>
          <button id="rec-stop-btn" class="danger" onclick="stopRecording()" disabled>Stop</button>
        </div>
        <div class="auto-info">
          <span><span class="label">Status: </span><span class="value stopped" id="rec-status-text">Stopped</span></span>
          <span><span class="label">Count: </span><span class="value" id="rec-count-text">0</span></span>
        </div>
      </div>
      <div class="auto-log-card">
        <div class="auto-log-header">
          <span>Record Log</span>
          <button class="secondary" id="rec-clear-btn" onclick="clearRecordLog()" disabled>Clear</button>
        </div>
        <div id="rec-log-list"></div>
      </div>
    </div>

    <!-- Train & Play Tab -->
    <div class="tab-content" id="tab-train">
      <!-- === TRAIN SECTION === -->
      <div id="train-section" style="display:flex;flex-direction:column;gap:6px;flex:1;min-height:0">
        <!-- Session selector bar -->
        <div class="train-controls" style="display:flex;gap:6px;align-items:center">
          <select id="train-session-select" onchange="loadTrainSession()" style="flex:1;background:var(--bg-1);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:12px">
            <option value="">Select session...</option>
          </select>
          <button class="secondary" style="font-size:11px;padding:3px 8px" onclick="loadTrainSessions()">Refresh</button>
          <button class="danger" style="font-size:11px;padding:3px 8px" onclick="deleteTrainSession()">Delete</button>
        </div>
        <!-- 3:7 split layout -->
        <div style="display:flex;gap:6px;flex:1;min-height:0">
          <!-- Left: Tree (30%) -->
          <div id="train-tree-panel" style="flex:3;display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden">
            <div style="padding:6px 8px;border-bottom:1px solid var(--line)">
              <span style="font-size:12px;font-weight:600">States</span>
            </div>
            <div id="train-progress" style="font-size:10px;color:var(--text-dim);padding:2px 8px;display:none"></div>
            <div id="train-tree-list" style="flex:1;overflow-y:auto;padding:4px;font-size:11px">
              <div style="color:var(--text-dim);padding:8px">Select a session to begin</div>
            </div>
          </div>
          <!-- Right: Detail (70%) -->
          <div id="train-detail-panel" style="flex:7;display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden">
            <div style="padding:6px 8px;border-bottom:1px solid var(--line)">
              <span id="train-detail-title" style="font-size:12px;font-weight:600">Detail</span>
            </div>
            <div id="train-detail-body" style="flex:1;overflow-y:auto;padding:8px">
              <div style="color:var(--text-dim);font-size:11px">Select a state or capture from the tree</div>
            </div>
          </div>
        </div>
        <!-- Action buttons -->
        <div style="border-top:1px solid var(--line);padding-top:8px;display:flex;justify-content:center;gap:8px">
          <button id="train-embed-btn" class="success" style="font-size:11px;padding:4px 14px" onclick="embedAllCaptures()" disabled>Embed</button>
          <button id="train-analyze-btn" class="secondary" style="font-size:11px;padding:4px 14px" onclick="analyzeAllCaptures()" disabled>Analyze</button>
          <button id="train-confirm-btn" style="font-size:11px;padding:4px 14px" onclick="confirmTrainChanges()" disabled>Confirm</button>
        </div>
      </div>

      <!-- === PLAY SECTION === -->
      <div style="border-top:2px solid var(--line);margin-top:8px;padding-top:8px;display:flex;flex-direction:column;gap:6px;flex-shrink:0">
        <div class="auto-card" style="margin:0">
          <h3 style="margin:0 0 6px 0;font-size:13px">Play</h3>
          <div class="auto-controls">
            <button id="auto-start-btn" class="success" onclick="startAuto()">Start Auto-Play</button>
            <button id="auto-stop-btn" class="danger" onclick="stopAuto()" disabled>Stop</button>
          </div>
          <div class="auto-info">
            <span><span class="label">Status: </span><span class="value stopped" id="auto-status-text">Stopped</span></span>
            <span><span class="label">Mode: </span><span id="auto-mode-text" style="color:var(--text-dim)">None</span></span>
          </div>
        </div>
        <!-- Game Rules -->
        <div class="play-ctrl" style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
          <label style="font-size:12px;font-weight:600;color:var(--text-dim)">Game Rules</label>
          <textarea id="rules-textarea" rows="3" placeholder="Describe game rules for the AI agent..."></textarea>
          <div class="learn-buttons">
            <button onclick="saveRules()">Save Rules</button>
            <button class="secondary" onclick="summarizeRules()">Summarize</button>
            <span id="summarize-status"></span>
          </div>
        </div>
      </div>

      <!-- === ACTIVITY LOG (visible during play) === -->
      <div class="auto-log-card" id="play-activity-log" style="flex:0 1 200px;min-height:100px;display:none">
        <div class="auto-log-header">
          <span>Activity Log</span>
          <button class="secondary" onclick="clearAutoLog()">Clear</button>
        </div>
        <div id="auto-log-list"></div>
      </div>
    </div>

  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="settings-modal-backdrop" onclick="if(event.target===this)closeSettingsModal()">
  <div class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
    <div class="settings-modal-header">
      <div class="settings-modal-title" id="settings-modal-title">Settings</div>
      <button class="secondary" onclick="closeSettingsModal()" aria-label="Close settings">Close</button>
    </div>
    <div class="settings-modal-body">
      <div class="setting-row">
        <label>API Key</label>
        <input id="cfg-api-key" type="password" placeholder="sk-...">
      </div>
      <div class="setting-row">
        <label>Game Model</label>
        <input id="cfg-model" placeholder="qwen/qwen3.5-27b">
      </div>
      <div class="setting-row">
        <label>Vision Model</label>
        <input id="cfg-vision-model" placeholder="google/gemini-2.0-flash-001">
      </div>
      <div class="setting-row">
        <label>Base URL</label>
        <input id="cfg-base-url" placeholder="https://openrouter.ai/api/v1">
      </div>
    </div>
    <div class="settings-modal-actions">
      <button class="secondary" onclick="closeSettingsModal()">Cancel</button>
      <button onclick="applySettings()">Apply</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jmuxer@2.1.0/dist/jmuxer.min.js"></script>
<script>
/* =================================================================
   scrcpy AI Control Panel - FastAPI Migration
   API calls -> same origin (Python FastAPI on port 8080)
   Video/Control WebSocket -> C backend on port 18080
   ================================================================= */

/* ---------- Helpers ---------- */
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtTime() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
    + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

async function api(method, path, body) {
  try {
    const opts = { method };
    if (body !== undefined) {
      opts.headers = { 'Content-Type': 'application/json' };
      opts.body = JSON.stringify(body);
    }
    const r = await fetch(path, opts);
    if (!r.ok) {
      const text = await r.text().catch(() => r.statusText);
      throw new Error(text || r.statusText);
    }
    const ct = r.headers.get('content-type') || '';
    if (ct.includes('application/json')) {
      return await r.json();
    }
    return { ok: true };
  } catch (e) {
    console.error('API error:', method, path, e);
    return null;
  }
}

/* ---------- Auto-Play (Play Tab) ---------- */
function formatToolCall(tc) {
  try {
    const fn = tc.function ? tc.function.name : '';
    const raw = tc.function ? tc.function.arguments : '{}';
    const a = JSON.parse(raw);
    if (fn === 'position_click') return 'click [' + a.x + ',' + a.y + ']';
    if (fn === 'position_long_press') return 'long_press [' + a.x + ',' + a.y + '] ' + (a.duration_ms || 500) + 'ms';
    if (fn === 'swipe') return 'swipe [' + a.x1 + ',' + a.y1 + '\u2192' + a.x2 + ',' + a.y2 + ']';
    if (fn === 'key_press') return 'key [' + a.keycode + ']';
    if (fn === 'key_down') return 'key_down [' + a.keycode + ']';
    if (fn === 'key_up') return 'key_up [' + a.keycode + ']';
    if (fn === 'input_text') return 'text "' + (a.text || '').substring(0, 30) + '"';
    if (fn === 'screenshot') return 'screenshot';
    return fn + '(' + raw.substring(0, 40) + ')';
  } catch (e) { return '(parse error)'; }
}

function appendAutoLog(messages) {
  if (!messages || messages.length <= autoLogMsgIndex) return;
  const logEl = document.getElementById('auto-log-list');
  if (!logEl) return;
  const wasAtBottom = logEl.scrollTop + logEl.clientHeight >= logEl.scrollHeight - 20;
  const ts = fmtTime();

  for (let i = autoLogMsgIndex; i < messages.length; i++) {
    const m = messages[i];
    if (m.role === 'system') continue;

    if (m.role === 'assistant') {
      let hasContent = m.content && m.content.trim();
      let hasTc = false;
      let tcParts = [];
      if (m.tool_calls) {
        try {
          const tcs = JSON.parse(m.tool_calls);
          if (Array.isArray(tcs) && tcs.length > 0) {
            hasTc = true;
            tcParts = tcs.map(formatToolCall);
          }
        } catch (e) { /* ignore */ }
      }
      if (!hasContent && !hasTc) continue;
      const div = document.createElement('div');
      div.className = 'log-entry';
      let html = '';
      if (hasContent) {
        const text = m.content.length > 120 ? m.content.substring(0, 120) + '...' : m.content;
        html += '<span class="log-ts">[' + escapeHtml(ts) + ']</span> ';
        html += '<span class="log-ai">AI:</span> ';
        html += '<span class="log-ai-text">"' + escapeHtml(text) + '"</span>';
      }
      if (hasTc) {
        if (hasContent) html += '<br>';
        html += '<span class="log-ts">[' + escapeHtml(ts) + ']</span> ';
        html += '<span class="log-tool">Tool:</span> ';
        html += '<span class="log-tool-detail">' + escapeHtml(tcParts.join(' | ')) + '</span>';
      }
      div.innerHTML = html;
      logEl.appendChild(div);
    } else if (m.role === 'tool') {
      const div = document.createElement('div');
      div.className = 'log-entry';
      const text = (m.content || '').length > 100 ? m.content.substring(0, 100) + '...' : (m.content || '');
      div.innerHTML = '<span class="log-ts">[' + escapeHtml(ts) + ']</span> '
        + '<span class="log-tool">Result:</span> '
        + '<span class="log-tool-detail">' + escapeHtml(text) + '</span>';
      logEl.appendChild(div);
    }
  }
  autoLogMsgIndex = messages.length;
  if (wasAtBottom) logEl.scrollTop = logEl.scrollHeight;
}

function appendActivityLog(entries) {
  if (!entries || entries.length <= activityLogIndex) return;
  const logEl = document.getElementById('auto-log-list');
  if (!logEl) return;
  const wasAtBottom = logEl.scrollTop + logEl.clientHeight >= logEl.scrollHeight - 20;
  const ts = fmtTime();

  for (let i = activityLogIndex; i < entries.length; i++) {
    const e = entries[i];
    if (!e.content) continue;
    const div = document.createElement('div');
    div.className = 'log-entry';
    const text = e.content.length > 200 ? e.content.substring(0, 200) + '...' : e.content;
    const roleClass = e.role === 'user' ? 'log-user' : 'log-ai';
    const roleLabel = e.role === 'user' ? 'User' : 'Agent';
    div.innerHTML = '<span class="log-ts">[' + escapeHtml(ts) + ']</span> '
      + '<span class="' + roleClass + '">' + roleLabel + ':</span> '
      + '<span class="log-ai-text">' + escapeHtml(text) + '</span>';
    logEl.appendChild(div);
  }
  activityLogIndex = entries.length;
  if (wasAtBottom) logEl.scrollTop = logEl.scrollHeight;
}

function renderAutoState(autoRunning, gameRules, playMode) {
  const statusEl = document.getElementById('auto-status-text');
  const startBtn = document.getElementById('auto-start-btn');
  const stopBtn = document.getElementById('auto-stop-btn');
  const modeEl = document.getElementById('auto-mode-text');
  const activityLog = document.getElementById('play-activity-log');
  const trainSection = document.getElementById('train-section');

  if (autoRunning) {
    statusEl.textContent = 'Running';
    statusEl.className = 'value';
    startBtn.disabled = true;
    stopBtn.disabled = false;
    // Disable all train controls and play controls (except Stop)
    document.querySelectorAll('#train-section button, #train-section select, .play-ctrl, .play-ctrl button, .play-ctrl textarea').forEach(el => {
      el.disabled = true;
      el.style.pointerEvents = 'none';
      el.style.opacity = '0.4';
    });
    trainSection.style.opacity = '0.5';
    trainSection.style.pointerEvents = 'none';
    // Show activity log
    if (activityLog) activityLog.style.display = '';
  } else {
    statusEl.textContent = 'Stopped';
    statusEl.className = 'value stopped';
    startBtn.disabled = false;
    stopBtn.disabled = true;
    // Re-enable all controls
    document.querySelectorAll('#train-section button, #train-section select, .play-ctrl, .play-ctrl button, .play-ctrl textarea').forEach(el => {
      el.disabled = false;
      el.style.pointerEvents = '';
      el.style.opacity = '';
    });
    trainSection.style.opacity = '';
    trainSection.style.pointerEvents = '';
  }

  if (modeEl) {
    if (playMode === 'clip') {
      modeEl.textContent = 'CLIP';
      modeEl.style.color = 'var(--accent-2)';
    } else if (playMode === 'hybrid') {
      modeEl.textContent = 'Hybrid';
      modeEl.style.color = 'var(--good)';
    } else if (playMode === 'tree') {
      modeEl.textContent = 'Tree';
      modeEl.style.color = 'var(--good)';
    } else if (playMode === 'rules') {
      modeEl.textContent = 'Rules';
      modeEl.style.color = 'var(--accent)';
    } else {
      modeEl.textContent = 'None';
      modeEl.style.color = 'var(--text-dim)';
    }
  }
}

    document.getElementById('train-session-select').value || '');

  const r = await api('POST', '/api/clip/load', { session: sess });
  if (r && r.ok) {
    const modeEl = document.getElementById('auto-mode-text');
    modeEl.textContent = 'CLIP (' + (r.count || 0) + ' embeddings)';
    modeEl.style.color = 'var(--accent-2)';
  } else {
    alert('Failed to load embeddings. Make sure they exist for this session.');
  }
}

async function loadTreeForPlay() {
  const r = await fetch('/api/train/tree');
  if (!r.ok) { alert('Failed to load tree'); return; }
  try {
    const data = await r.json();
    if (data && data.states && data.states.length > 0) {
      const modeEl = document.getElementById('auto-mode-text');
      modeEl.textContent = 'Tree (' + data.states.length + ' states)';
      modeEl.style.color = 'var(--good)';
    } else {
      alert('No tree found. Build and save a tree in the Train tab first.');
    }
  } catch (e) { alert('Failed to parse tree'); }
}

/* ---------- Recording ---------- */
let recordPending = false; // prevent polling override during API calls
let recordCapturing = false; // prevent concurrent captures

async function startRecording() {
  recordPending = true;
  const r = await api('POST', '/api/record/start');
  recordPending = false;
  if (r) {
    isRecording = true;
    recordCount = 0;
    recordLogEntries = [];
    updateRecordUI();
  }
}

async function stopRecording() {
  // Immediately update UI
  isRecording = false;
  updateRecordUI();
  recordPending = true;
  await api('POST', '/api/record/stop');
  recordPending = false;
}

function updateRecordUI() {
  const statusEl = document.getElementById('rec-status-text');
  const startBtn = document.getElementById('rec-start-btn');
  const stopBtn = document.getElementById('rec-stop-btn');
  const countEl = document.getElementById('rec-count-text');
  const clearBtn = document.getElementById('rec-clear-btn');
  const wrapper = document.getElementById('video-wrapper');
  if (isRecording) {
    statusEl.textContent = 'Recording';
    statusEl.className = 'value';
    startBtn.disabled = true;
    stopBtn.disabled = false;
    clearBtn.disabled = true;
    wrapper.classList.add('recording');
  } else {
    statusEl.textContent = 'Stopped';
    statusEl.className = 'value stopped';
    startBtn.disabled = false;
    stopBtn.disabled = true;
    clearBtn.disabled = (recordCount === 0);
    wrapper.classList.remove('recording');
  }
  countEl.textContent = recordCount;
}

async function clearRecordLog() {
  if (isRecording) return;
  await api('POST', '/api/record/clear');
  recordLogEntries = [];
  recordCount = 0;
  document.getElementById('rec-log-list').innerHTML = '';
  document.getElementById('rec-count-text').textContent = '0';
}

/* ---------- Train Tab ---------- */
let trainCaptures = [];
let trainLabels = {};
let trainTree = { states: [] };
let trainSelectedNode = null;
let trainSessionName = '';
let trainDirty = false;

function setTrainDirty(dirty) {
  trainDirty = dirty;
  const btn = document.getElementById('train-confirm-btn');
  if (btn) btn.disabled = !dirty;
}

async function confirmTrainChanges() {
  const sess = document.getElementById('train-session-select').value;
  if (!sess) return;
  // Save embeddings
  const r = await api('POST', '/api/train/save', { session: sess, labels: trainLabels });
  if (r && r.ok) {
    setTrainDirty(false);
    const prog = document.getElementById('train-progress');
    prog.style.display = 'block';
    prog.textContent = 'Saved successfully.';
    setTimeout(function () { prog.style.display = 'none'; }, 3000);
  } else {
    alert('Save failed.');
  }
}

async function loadTrainSessions() {
  const r = await api('GET', '/api/train/sessions');
  if (!r) return;
  const sel = document.getElementById('train-session-select');
  sel.innerHTML = '<option value="">Select session...</option>';
  const sessions = Array.isArray(r) ? r : [];
  sessions.sort((a, b) => b.name.localeCompare(a.name));
  for (const s of sessions) {
    const opt = document.createElement('option');
    opt.value = s.name;
    opt.textContent = s.name + ' (' + s.count + ')';
    sel.appendChild(opt);
  }
}

async function deleteTrainSession() {
  const name = document.getElementById('train-session-select').value;
  if (!name) return;
  if (!confirm('Delete session ' + name + '? This cannot be undone.')) return;
  await api('POST', '/api/train/session/delete', { name: name });
  trainCaptures = [];
  trainLabels = {};
  trainTree = { states: [] };
  trainSelectedNode = null;
  renderTreeList();
  renderTrainDetail();
  loadTrainSessions();
}

async function loadTrainSession() {
  const name = document.getElementById('train-session-select').value;
  if (!name) return;
  trainSessionName = name;
  const r = await api('GET', '/api/train/session?name=' + encodeURIComponent(name));
  if (!r) return;
  trainCaptures = Array.isArray(r) ? r : [];
  trainCaptures.sort((a, b) => a.index - b.index);
  trainLabels = {};
  trainTree = { states: [] };
  trainSelectedNode = null;
  setTrainDirty(false);
  // Load saved labels if any
  const lbls = await api('GET', '/api/train/labels?session=' + encodeURIComponent(name));
  if (lbls && typeof lbls === 'object' && !('ok' in lbls)) {
    trainLabels = lbls;
  }
  renderTreeList();
  renderTrainDetail();
  document.getElementById('train-analyze-btn').disabled = (trainCaptures.length === 0);
  document.getElementById('train-embed-btn').disabled = (trainCaptures.length === 0);
}

function renderTreeList() {
  const el = document.getElementById('train-tree-list');
  if (trainCaptures.length === 0 && trainTree.states.length === 0) {
    el.innerHTML = '<div style="color:var(--text-dim);padding:8px">Load a session to begin</div>';
    return;
  }
  let html = '';
  if (trainTree.states.length > 0) {
    trainTree.states.forEach(function (state, si) {
      const isSel = trainSelectedNode && trainSelectedNode.type === 'state'
        && trainSelectedNode.idx === si;
      html += '<div class="train-tree-node" style="cursor:pointer;padding:3px 6px;border-radius:4px;margin-bottom:1px;display:flex;align-items:center;gap:4px;'
        + (isSel ? 'background:var(--bg-2);border-left:2px solid var(--accent)' : '') + '">';
      html += '<input type="checkbox" class="merge-cb" data-si="' + si + '" style="width:12px;height:12px;cursor:pointer" onclick="event.stopPropagation();updateMergeBtn()" title="Select for merge">';
      html += '<span style="flex:1;cursor:pointer" onclick="selectTreeNode(\'state\',' + si + ')">';
      html += '<span style="color:var(--accent);font-weight:600">' + escapeHtml(state.label) + '</span>';
      html += '<span style="color:var(--text-dim);margin-left:4px">(' + state.captures.length + ')</span>';
      html += '</span>';
      html += '<button style="font-size:9px;padding:0 4px;background:transparent;color:var(--bad);border:1px solid var(--bad);border-radius:3px;cursor:pointer" onclick="event.stopPropagation();deleteState(' + si + ')" title="Delete state">&times;</button>';
      html += '</div>';
      state.captures.forEach(function (capIdx, ci) {
        const isCap = trainSelectedNode && trainSelectedNode.type === 'capture'
          && trainSelectedNode.stateIdx === si && trainSelectedNode.capIdx === ci;
        html += '<div style="cursor:pointer;padding:2px 6px 2px 18px;border-radius:4px;margin-bottom:1px;font-size:10px;'
          + (isCap ? 'background:var(--bg-2);border-left:2px solid var(--accent-2)' : '') + '" onclick="selectTreeNode(\'capture\',' + si + ',' + ci + ')">';
        const cap = trainCaptures.find(function (c) { return c.index === capIdx; });
        html += '#' + capIdx;
        if (cap) html += ' <span style="color:var(--text-dim)">(' + cap.x + ',' + cap.y + ')</span>';
        html += '</div>';
      });
    });
  } else {
    trainCaptures.forEach(function (cap, i) {
      const isSel = trainSelectedNode && trainSelectedNode.type === 'flat'
        && trainSelectedNode.idx === i;
      const label = trainLabels[cap.index] || '';
      html += '<div style="cursor:pointer;padding:3px 6px;border-radius:4px;margin-bottom:1px;font-size:11px;'
        + (isSel ? 'background:var(--bg-2);border-left:2px solid var(--accent)' : '') + '" onclick="selectTreeNode(\'flat\',' + i + ')">';
      html += '#' + cap.index;
      html += ' <span style="color:var(--text-dim)">(' + cap.x + ',' + cap.y + ')</span>';
      if (label) html += ' <span style="color:var(--accent)">' + escapeHtml(label) + '</span>';
      html += '</div>';
    });
  }
  el.innerHTML = html;
}

function selectTreeNode(type, idx, capIdx) {
  if (type === 'capture') {
    trainSelectedNode = { type: 'capture', stateIdx: idx, capIdx: capIdx };
  } else {
    trainSelectedNode = { type: type, idx: idx };
  }
  renderTreeList();
  renderTrainDetail();
}

function renderTrainDetail() {
  const titleEl = document.getElementById('train-detail-title');
  const bodyEl = document.getElementById('train-detail-body');
  const sess = trainSessionName || trainTree.session || document.getElementById('train-session-select').value;
  if (!trainSelectedNode) {
    titleEl.textContent = 'Detail';
    bodyEl.innerHTML = '<div style="color:var(--text-dim);font-size:11px">Select a state or capture from the tree</div>';
    return;
  }
  const sel = trainSelectedNode;
  if (sel.type === 'state') {
    const state = trainTree.states[sel.idx];
    titleEl.textContent = 'State: ' + state.label;
    let h = '<div style="margin-bottom:8px">';
    h += '<label style="font-size:11px;color:var(--text-dim)">State Label</label>';
    h += '<input id="train-state-label" value="' + escapeHtml(state.label)
      + '" style="width:100%;background:var(--bg-0);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:12px;margin-top:2px" onchange="updateStateLabel(' + sel.idx + ',this.value)">';
    h += '</div>';
    h += '<div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">Captures (' + state.captures.length + ')</div>';
    h += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">';
    state.captures.forEach(function (capIdx, ci) {
      const imgUrl = '/api/train/image?session=' + encodeURIComponent(sess) + '&index=' + capIdx;
      h += '<div style="position:relative;display:inline-block">';
      h += '<img src="' + imgUrl + '" style="height:50px;border-radius:4px;border:1px solid var(--line)" title="#' + capIdx + '" loading="lazy">';
      h += '<button style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;font-size:10px;padding:0;background:var(--bad);color:#fff;border:none;border-radius:50%;cursor:pointer;line-height:16px;text-align:center" onclick="removeCaptureFromState(' + sel.idx + ',' + ci + ')" title="Remove capture">&times;</button>';
      h += '</div>';
    });
    h += '</div>';
    h += '<div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">Actions (' + state.actions.length + ')</div>';
    state.actions.forEach(function (action, ai) {
      h += '<div style="display:flex;gap:4px;align-items:center;margin-bottom:3px;font-size:11px">';
      h += '<span style="color:var(--good)">tap (' + action.x + ',' + action.y + ')</span>';
      h += '<input value="' + escapeHtml(action.description || '') + '" placeholder="description" style="flex:1;background:var(--bg-0);color:var(--text);border:1px solid var(--line);border-radius:4px;padding:2px 6px;font-size:11px" onchange="updateActionDesc(' + sel.idx + ',' + ai + ',this.value)">';
      h += '<button style="font-size:9px;padding:0 4px;background:transparent;color:var(--bad);border:1px solid var(--bad);border-radius:3px;cursor:pointer" onclick="deleteAction(' + sel.idx + ',' + ai + ')" title="Delete action">&times;</button>';
      h += '</div>';
    });
    bodyEl.innerHTML = h;
  } else if (sel.type === 'capture') {
    const state = trainTree.states[sel.stateIdx];
    const capIdx = state.captures[sel.capIdx];
    const cap = trainCaptures.find(function (c) { return c.index === capIdx; });
    titleEl.textContent = 'Capture #' + capIdx;
    const imgUrl = '/api/train/image?session=' + encodeURIComponent(sess) + '&index=' + capIdx;

async function embedAllCaptures() {

function buildDecisionTree() {
  const groups = {};
  for (const cap of trainCaptures) {
    const label = (trainLabels[cap.index] || 'Unknown').trim();
    if (!groups[label]) groups[label] = { captures: [], actions: [] };
    groups[label].captures.push(cap.index);
    if (cap.x || cap.y) {
      const exists = groups[label].actions.some(function (a) {
        return Math.abs(a.x - cap.x) < 20 && Math.abs(a.y - cap.y) < 20;
      });
      if (!exists) {
        groups[label].actions.push({ x: cap.x, y: cap.y, w: cap.w, h: cap.h, description: '' });
      }
    }
  }
  const sess = document.getElementById('train-session-select').value;
  trainTree = { session: sess, states: [] };
  let idx = 0;
  for (const [label, data] of Object.entries(groups)) {
    trainTree.states.push({
      id: 'state_' + idx++,
      label: label,
      captures: data.captures,
      actions: data.actions
    });
  }
  trainSelectedNode = null;
  renderTreeList();
  renderTrainDetail();
  document.getElementById('train-save-tree-btn').disabled = false;
  document.getElementById('train-export-btn').disabled = false;
}

async function saveDecisionTree() {
  await api('POST', '/api/train/tree', trainTree);
  const prog = document.getElementById('train-progress');
  prog.style.display = 'block';
  prog.textContent = 'Tree saved!';
  setTimeout(function () { prog.style.display = 'none'; }, 2000);
}

      trainSelectedNode = null;
      if (data.session) {

      renderTreeList();
      renderTrainDetail();
      document.getElementById('train-save-tree-btn').disabled = false;
      document.getElementById('train-export-btn').disabled = false;

  } catch (e) { /* ignore */ }
}

function removeCaptureFromState(stateIdx, capIdx) {

function updateMergeBtn() {

  document.getElementById('train-merge-btn').disabled = (cbs.length < 2);
}

function mergeSelectedStates() {
  const cbs = document.querySelectorAll('.merge-cb:checked');
  if (cbs.length < 2) return;
  const indices = [];
  cbs.forEach(function (cb) { indices.push(parseInt(cb.dataset.si)); });
  indices.sort(function (a, b) { return a - b; });
  const target = trainTree.states[indices[0]];
  for (let i = 1; i < indices.length; i++) {
    const src = trainTree.states[indices[i]];
    src.captures.forEach(function (c) {
      if (target.captures.indexOf(c) < 0) target.captures.push(c);
    });
    src.actions.forEach(function (a) {
      const exists = target.actions.some(function (ta) {
        return Math.abs(ta.x - a.x) < 20 && Math.abs(ta.y - a.y) < 20;
      });
      if (!exists) target.actions.push(a);
    });
  }
  for (let i = indices.length - 1; i >= 1; i--) {
    trainTree.states.splice(indices[i], 1);
  }
  trainTree.states.forEach(function (s, i) { s.id = 'state_' + i; });
  trainSelectedNode = null;
  renderTreeList();
  renderTrainDetail();
  document.getElementById('train-merge-btn').disabled = true;
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function (e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data && data.states) {
        trainTree = data;
        trainSelectedNode = null;
        renderTreeList();
        renderTrainDetail();
        document.getElementById('train-save-tree-btn').disabled = false;
        document.getElementById('train-export-btn').disabled = false;
        const prog = document.getElementById('train-progress');
        prog.style.display = 'block';
        prog.textContent = 'Imported: ' + trainTree.states.length + ' states';
        setTimeout(function () { prog.style.display = 'none'; }, 3000);
      } else {
        alert('Invalid tree JSON: missing states array');
      }
    } catch (err) {
      alert('Failed to parse JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

/* =================================================================
   Remote Panel Logic - Video & Touch
   WebSocket connections go to C backend on SCRCPY_PORT (18080)
   ================================================================= */
let deviceWidth = 0, deviceHeight = 0;
let deviceCodec = null;
let jmuxerInstance = null;
let videoWs = null;
let controlWs = null;
let videoStarted = false;
let videoRotationDeg = 0;
let manualRotationLock = false;

const isFirefoxBrowser = /Firefox\//.test(navigator.userAgent)
  || typeof InstallTrigger !== 'undefined';
const isChromiumBrowser = !isFirefoxBrowser
  && (/(Chrome|Chromium|Edg)\//.test(navigator.userAgent)
    || (!!window.chrome && !!window.chrome.runtime));

function toggleVideoRotation(e) {
  if (e && e.shiftKey) {
    manualRotationLock = false;
    updateVideoOrientation();
    return;
  }
  manualRotationLock = true;
  videoRotationDeg = videoRotationDeg === 0 ? -90 : 0;
  applyVideoLayout();
}

function updateVideoOrientation() {
  if (manualRotationLock) return;
  if (!isChromiumBrowser) {
    if (videoRotationDeg !== 0) {
      videoRotationDeg = 0;
      applyVideoLayout();
    }
    return;
  }
  const video = document.getElementById('remote-video');
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh || !deviceWidth || !deviceHeight) return;
  const needsRotation = (deviceHeight > deviceWidth) !== (vh > vw);
  const newDeg = needsRotation ? -90 : 0;
  if (newDeg === videoRotationDeg) return;
  videoRotationDeg = newDeg;
  applyVideoLayout();
}

function applyVideoLayout() {
  const video = document.getElementById('remote-video');
  if (videoRotationDeg === 0) {
    video.classList.remove('rotated');
    video.style.transform = '';
    video.style.width = '';
    video.style.height = '';
    return;
  }
  // After -90deg rotation, the video's width becomes visual height and vice versa.
  // Size the video element so that AFTER rotation it fits within the wrapper.
  const wrapper = document.getElementById('video-wrapper');
  const wW = wrapper.clientWidth, wH = wrapper.clientHeight;
  // Device aspect ratio (portrait: e.g. 520/1280)
  const ar = deviceWidth / deviceHeight;
  // After rotation, visual dimensions swap: visual width = deviceHeight side, visual height = deviceWidth side
  // We need: rotated video (visually landscape) to fit in wrapper
  // rotatedAR = deviceHeight / deviceWidth (e.g. 1280/520 = 2.46)
  const rotatedAR = deviceHeight / deviceWidth;
  let visW, visH;
  if (rotatedAR > wW / wH) {
    // Width-limited
    visW = wW;
    visH = wW / rotatedAR;
  } else {
    // Height-limited
    visH = wH;
    visW = wH * rotatedAR;
  }
  video.classList.add('rotated');
  // Set video element size = swapped (because CSS rotate swaps visual axes)
  video.style.width = visH + 'px';
  video.style.height = visW + 'px';
  video.style.transform = 'translate(-50%, -50%) rotate(-90deg)';
}

function initVideoWs() {
  videoWs = new WebSocket(videoWsUrl);
  videoWs.binaryType = 'arraybuffer';

  videoWs.onopen = () => {
    document.getElementById('remote-status').textContent = 'Video: Connected';
    videoStarted = false;
    document.getElementById('video-loading').style.display = 'flex';
  };

  videoWs.onmessage = (evt) => {
    if (typeof evt.data === 'string') {
      try {
        const info = JSON.parse(evt.data);
        deviceWidth = info.width || 0;
        deviceHeight = info.height || 0;
        const newCodec = info.codec || 'h264';
        document.getElementById('remote-status').textContent =
          'Video: ' + deviceWidth + 'x' + deviceHeight + ' [' + newCodec.toUpperCase() + ']';
        resizeOverlay();
        if (!jmuxerInstance || newCodec !== deviceCodec) {
          deviceCodec = newCodec;
          initJmuxer(newCodec);
        }
      } catch (e) { /* ignore */ }
      return;
    }
    // Binary video data
    if (!jmuxerInstance) return;
    const data = new Uint8Array(evt.data);
    try {
      jmuxerInstance.feed({ video: data });
    } catch (e) {
      console.error('jmuxer feed error:', e);
    }
    const vid = document.getElementById('remote-video');
    if (vid.paused) vid.play().catch(function () { });
    if (vid.buffered.length > 0) {
      const end = vid.buffered.end(vid.buffered.length - 1);
      if (end - vid.currentTime > 0.5) {
        vid.currentTime = end - 0.1;
      }
    }
  };

  videoWs.onclose = () => {
    document.getElementById('remote-status').textContent = 'Video: Disconnected';
    setTimeout(initVideoWs, 3000);
  };

  videoWs.onerror = () => {
    videoWs.close();
  };
}

function initControlWs() {
  controlWs = new WebSocket(controlWsUrl);

  controlWs.onclose = () => {
    setTimeout(initControlWs, 3000);
  };

  controlWs.onerror = () => {
    controlWs.close();
  };
}

function sendKey(key) {
  if (controlWs && controlWs.readyState === WebSocket.OPEN) {
    controlWs.send(JSON.stringify({ type: 'key', key: key }));
  }
}

async function sendTouch(action, clientX, clientY) {
  const dbg = document.getElementById('remote-status');
  if (!controlWs || controlWs.readyState !== WebSocket.OPEN) {
    dbg.textContent = 'Touch: WS not open';
    return;
  }

  const video = document.getElementById('remote-video');
  const vw = (videoRotationDeg !== 0) ? deviceWidth : (video.videoWidth || deviceWidth);
  const vh = (videoRotationDeg !== 0) ? deviceHeight : (video.videoHeight || deviceHeight);
  if (!vw || !vh) {
    dbg.textContent = 'Touch: no dimensions';
    return;
  }

  const videoRect = video.getBoundingClientRect();
  const relX = clientX - videoRect.left;
  const relY = clientY - videoRect.top;
  const normX = Math.max(0, Math.min(1, relX / videoRect.width));
  const normY = Math.max(0, Math.min(1, relY / videoRect.height));
  const x = Math.min(Math.round(normX * vw), vw - 1);
  const y = Math.min(Math.round(normY * vh), vh - 1);

  // During recording: screenshot FIRST, then touch. If screenshot fails, ignore touch.
  if (isRecording && action === 'down') {
    if (recordCapturing) {
      dbg.textContent = 'Recording: previous capture in progress...';
      return;
    }
    recordCapturing = true;
    dbg.textContent = 'Recording: capturing screenshot...';
    try {
      recordCount++;
      const idx = recordCount;
      const r = await api('POST', '/api/record/capture', { x: x, y: y, w: vw, h: vh, index: idx });
      if (r && r.ok) {
        // Screenshot saved — now send the actual touch (down + up = tap)
        controlWs.send(JSON.stringify({ type: 'touch', action: 'down', x: x, y: y, w: vw, h: vh }));
        controlWs.send(JSON.stringify({ type: 'touch', action: 'up', x: x, y: y, w: vw, h: vh }));
        addRecordLogEntry(x, y, vw, vh, idx);
        updateRecordUI();
        dbg.textContent = 'Recorded #' + idx + ': ' + x + ',' + y;
      } else {
        recordCount--;
        dbg.textContent = 'Capture failed — touch ignored. Try again.';
      }
    } catch (e) {
      recordCount--;
      dbg.textContent = 'Capture failed — touch ignored. Try again.';
    }
    recordCapturing = false;
    return;
  }

  const msg = { type: 'touch', action: action, x: x, y: y, w: vw, h: vh };
  controlWs.send(JSON.stringify(msg));
  dbg.textContent = 'Touch: ' + action + ' ' + x + ',' + y + ' (' + vw + 'x' + vh + ')';
}

function resizeOverlay() {
  const canvas = document.getElementById('touch-overlay');
  const wrapper = document.getElementById('video-wrapper');
  canvas.width = wrapper.clientWidth;
  canvas.height = wrapper.clientHeight;
}

// Touch/mouse events on canvas overlay
(function () {
  const overlay = document.getElementById('touch-overlay');
  let isDown = false;

  overlay.addEventListener('mousedown', async (e) => {
    e.preventDefault();
    isDown = true;
    await sendTouch('down', e.clientX, e.clientY);
  });
  overlay.addEventListener('mousemove', (e) => {
    if (!isDown || recordCapturing) return;
    e.preventDefault();
    sendTouch('move', e.clientX, e.clientY);
  });
  overlay.addEventListener('mouseup', (e) => {
    if (!isDown) return;
    isDown = false;
    if (recordCapturing) return;
    e.preventDefault();
    sendTouch('up', e.clientX, e.clientY);
  });
  overlay.addEventListener('mouseleave', (e) => {
    if (!isDown) return;
    isDown = false;
    if (recordCapturing) return;
    sendTouch('up', e.clientX, e.clientY);
  });

  overlay.addEventListener('touchstart', async (e) => {
    e.preventDefault();
    const t = e.touches[0];
    isDown = true;
    await sendTouch('down', t.clientX, t.clientY);
  });
  overlay.addEventListener('touchmove', (e) => {
    if (recordCapturing) return;
    e.preventDefault();
    const t = e.touches[0];
    sendTouch('move', t.clientX, t.clientY);
  });
  overlay.addEventListener('touchend', (e) => {
    e.preventDefault();
    isDown = false;
    if (recordCapturing) return;
    const t = e.changedTouches[0];
    sendTouch('up', t.clientX, t.clientY);
  });
  overlay.addEventListener('touchcancel', (e) => {
    e.preventDefault();
    isDown = false;
    const t = e.changedTouches[0];
    sendTouch('up', t.clientX, t.clientY);
  });

  window.addEventListener('resize', function () {
    resizeOverlay();
    if (videoRotationDeg !== 0) applyVideoLayout();
  });
})();

function initJmuxer(codec) {
  const statusEl = document.getElementById('remote-status');
  if (typeof JMuxer === 'undefined') {
    statusEl.textContent = 'Error: jmuxer.js not loaded';
    return;
  }

  if (typeof MediaSource === 'undefined') {
    statusEl.textContent = 'Error: MediaSource API not supported';
    return;
  }

  let mseCodec, jmuxerVideoCodec;
  if (codec === 'h265') {
    mseCodec = 'video/mp4; codecs="hev1.1.6.L93.B0"';
    jmuxerVideoCodec = 'H265';
  } else {
    mseCodec = 'video/mp4; codecs="avc1.640028"';
    jmuxerVideoCodec = undefined;
  }

  if (!MediaSource.isTypeSupported(mseCodec)) {
    statusEl.textContent = 'Error: ' + codec.toUpperCase() + ' codec not supported by browser';
    console.error('MSE codec not supported:', mseCodec);
    return;
  }

  if (jmuxerInstance) {
    try { jmuxerInstance.destroy(); } catch (e) { /* ignore */ }
    jmuxerInstance = null;
  }

  try {
    const opts = {
      node: 'remote-video',
      mode: 'video',
      flushingTime: 100,
      fps: 30,
      debug: false,
      onReady: function () {
        statusEl.textContent = 'JMuxer ready [' + codec.toUpperCase() + '], waiting for video...';
        window._jmuxerRetryCount = 0;
      },
      onError: function (err) {
        console.error('JMuxer error:', err);
        const errName = err && (err.name || '');
        const errMsg = err && (err.error || err.message || '');
        statusEl.textContent = 'JMuxer error: ' + (errMsg || err);
        // Auto-recover from buffer errors (e.g. resolution change on app switch)
        // but limit retries to avoid infinite loop
        if (errName === 'InvalidStateError' || errMsg === 'buffer error') {
          if (!window._jmuxerRetryCount) window._jmuxerRetryCount = 0;
          window._jmuxerRetryCount++;
          if (window._jmuxerRetryCount <= 3) {
            console.warn('JMuxer buffer error, reinit attempt', window._jmuxerRetryCount);
            statusEl.textContent = 'Reinitializing video...';
            setTimeout(function () {
              initJmuxer(deviceCodec || 'h264');
            }, 1000);
          } else {
            console.error('JMuxer reinit failed 3 times, reconnecting WebSocket...');
            statusEl.textContent = 'Reconnecting video stream...';
            window._jmuxerRetryCount = 0;
            if (videoWs) videoWs.close();
          }
        }
      }
    };
    if (jmuxerVideoCodec) {
      opts.videoCodec = jmuxerVideoCodec;
    }
    jmuxerInstance = new JMuxer(opts);
    statusEl.textContent = 'JMuxer initialized [' + codec.toUpperCase() + '], connecting...';
  } catch (e) {
    statusEl.textContent = 'JMuxer init error: ' + e.message;
  }
}

(function () {

    }
  });
  remoteVid.addEventListener('resize', function () {
    updateVideoOrientation();
  });

  initVideoWs();
  initControlWs();
  resizeOverlay();
})();
</script>
